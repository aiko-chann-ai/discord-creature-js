<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reptile Auto Movement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: black;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: fixed;
            touch-action: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            will-change: transform;
            transform: translateZ(0);
        }
    </style>
</head>
<body>
<script>
// ============================================================
// MOBILE DETECTION
// ============================================================
var screenWidth = window.innerWidth;
var sizeMultiplier = 1;

if (screenWidth <= 480) {
    sizeMultiplier = 0.5;
} else if (screenWidth <= 768) {
    sizeMultiplier = 0.65;
} else if (screenWidth <= 1024) {
    sizeMultiplier = 0.85;
} else {
    sizeMultiplier = 1;
}

// ============================================================
// AUTO-MOVEMENT SYSTEM
// ============================================================
var AutoPath = {
    targetX: 0,
    targetY: 0,
    changeTime: 3000,
    lastChange: Date.now(),
    margin: screenWidth <= 768 ? 80 : 120,
    
    init: function() {
        this.targetX = window.innerWidth / 2;
        this.targetY = window.innerHeight / 3;
    },
    
    getTarget: function() {
        var now = Date.now();
        if (now - this.lastChange > this.changeTime) {
            this.targetX = this.margin + Math.random() * (window.innerWidth - this.margin * 2);
            this.targetY = this.margin + Math.random() * (window.innerHeight - this.margin * 2);
            this.lastChange = now;
            this.changeTime = 2000 + Math.random() * 3000;
        }
        return { x: this.targetX, y: this.targetY };
    }
};

// ============================================================
// INPUT SYSTEM
// ============================================================
var Input = {
  keys: [],
  mouse: { left: false, right: false, middle: false, x: 0, y: 0 }
};
for (var i = 0; i < 230; i++) {
  Input.keys.push(false);
}
document.addEventListener("keydown", function(event) {
  Input.keys[event.keyCode] = true;
});
document.addEventListener("keyup", function(event) {
  Input.keys[event.keyCode] = false;
});
document.addEventListener("mousedown", function(event) {
  if ((event.button = 0)) Input.mouse.left = true;
  if ((event.button = 1)) Input.mouse.middle = true;
  if ((event.button = 2)) Input.mouse.right = true;
});
document.addEventListener("mouseup", function(event) {
  if ((event.button = 0)) Input.mouse.left = false;
  if ((event.button = 1)) Input.mouse.middle = false;
  if ((event.button = 2)) Input.mouse.right = false;
});
document.addEventListener("mousemove", function(event) {
  Input.mouse.x = event.clientX;
  Input.mouse.y = event.clientY;
});

// ============================================================
// CANVAS SETUP WITH MOBILE OPTIMIZATION
// ============================================================
var canvas = document.createElement("canvas");
document.body.appendChild(canvas);
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
canvas.style.position = "absolute";
canvas.style.left = "0px";
canvas.style.top = "0px";
canvas.style.backgroundColor = "black";

// Mobile optimization
canvas.style.willChange = 'transform';
canvas.style.transform = 'translateZ(0)';

var ctx = canvas.getContext("2d");
ctx.strokeStyle = "white";
ctx.lineWidth = 1;

// Window resize handler
window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// ============================================================
// SEGMENT CLASS
// ============================================================
var segmentCount = 0;
class Segment {
  constructor(parent, size, angle, range, stiffness) {
    segmentCount++;
    this.isSegment = true;
    this.parent = parent;
    if (typeof parent.children == "object") {
      parent.children.push(this);
    }
    this.children = [];
    this.size = size;
    this.relAngle = angle;
    this.defAngle = angle;
    this.absAngle = parent.absAngle + angle;
    this.range = range;
    this.stiffness = stiffness;
    this.updateRelative(false, true);
  }
  updateRelative(iter, flex) {
    this.relAngle = this.relAngle - 2 * Math.PI * Math.floor((this.relAngle - this.defAngle) / 2 / Math.PI + 1 / 2);
    if (flex) {
      this.relAngle = Math.min(
        this.defAngle + this.range / 2,
        Math.max(
          this.defAngle - this.range / 2,
          (this.relAngle - this.defAngle) / this.stiffness + this.defAngle
        )
      );
    }
    this.absAngle = this.parent.absAngle + this.relAngle;
    this.x = this.parent.x + Math.cos(this.absAngle) * this.size;
    this.y = this.parent.y + Math.sin(this.absAngle) * this.size;
    if (iter) {
      for (var i = 0; i < this.children.length; i++) {
        this.children[i].updateRelative(iter, flex);
      }
    }
  }
  draw(iter) {
    ctx.beginPath();
    ctx.moveTo(this.parent.x, this.parent.y);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
    if (iter) {
      for (var i = 0; i < this.children.length; i++) {
        this.children[i].draw(true);
      }
    }
  }
  follow(iter) {
    var x = this.parent.x;
    var y = this.parent.y;
    var dist = ((this.x - x) ** 2 + (this.y - y) ** 2) ** 0.5;
    this.x = x + this.size * (this.x - x) / dist;
    this.y = y + this.size * (this.y - y) / dist;
    this.absAngle = Math.atan2(this.y - y, this.x - x);
    this.relAngle = this.absAngle - this.parent.absAngle;
    this.updateRelative(false, true);
    if (iter) {
      for (var i = 0; i < this.children.length; i++) {
        this.children[i].follow(true);
      }
    }
  }
}

// ============================================================
// LIMB SYSTEM CLASS
// ============================================================
class LimbSystem {
  constructor(end, length, speed, creature) {
    this.end = end;
    this.length = Math.max(1, length);
    this.creature = creature;
    this.speed = speed;
    creature.systems.push(this);
    this.nodes = [];
    var node = end;
    for (var i = 0; i < length; i++) {
      this.nodes.unshift(node);
      node = node.parent;
      if (!node.isSegment) {
        this.length = i + 1;
        break;
      }
    }
    this.hip = this.nodes[0].parent;
  }
  moveTo(x, y) {
    this.nodes[0].updateRelative(true, true);
    var dist = ((x - this.end.x) ** 2 + (y - this.end.y) ** 2) ** 0.5;
    var len = Math.max(0, dist - this.speed);
    for (var i = this.nodes.length - 1; i >= 0; i--) {
      var node = this.nodes[i];
      var ang = Math.atan2(node.y - y, node.x - x);
      node.x = x + len * Math.cos(ang);
      node.y = y + len * Math.sin(ang);
      x = node.x;
      y = node.y;
      len = node.size;
    }
    for (var i = 0; i < this.nodes.length; i++) {
      var node = this.nodes[i];
      node.absAngle = Math.atan2(node.y - node.parent.y, node.x - node.parent.x);
      node.relAngle = node.absAngle - node.parent.absAngle;
      for (var ii = 0; ii < node.children.length; ii++) {
        var childNode = node.children[ii];
        if (!this.nodes.includes(childNode)) {
          childNode.updateRelative(true, false);
        }
      }
    }
  }
  update() {
    var target = AutoPath.getTarget();
    this.moveTo(target.x, target.y);
  }
}

// ============================================================
// LEG SYSTEM CLASS
// ============================================================
class LegSystem extends LimbSystem {
  constructor(end, length, speed, creature) {
    super(end, length, speed, creature);
    this.goalX = end.x;
    this.goalY = end.y;
    this.step = 0;
    this.forwardness = 0;
    this.reach = 0.9 * ((this.end.x - this.hip.x) ** 2 + (this.end.y - this.hip.y) ** 2) ** 0.5;
    var relAngle = this.creature.absAngle - Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x);
    relAngle -= 2 * Math.PI * Math.floor(relAngle / 2 / Math.PI + 1 / 2);
    this.swing = -relAngle + (2 * (relAngle < 0) - 1) * Math.PI / 2;
    this.swingOffset = this.creature.absAngle - this.hip.absAngle;
  }
  update(x, y) {
    this.moveTo(this.goalX, this.goalY);
    if (this.step == 0) {
      var dist = ((this.end.x - this.goalX) ** 2 + (this.end.y - this.goalY) ** 2) ** 0.5;
      if (dist > 1) {
        this.step = 1;
        this.goalX = this.hip.x + this.reach * Math.cos(this.swing + this.hip.absAngle + this.swingOffset) + (2 * Math.random() - 1) * this.reach / 2;
        this.goalY = this.hip.y + this.reach * Math.sin(this.swing + this.hip.absAngle + this.swingOffset) + (2 * Math.random() - 1) * this.reach / 2;
      }
    } else if (this.step == 1) {
      var theta = Math.atan2(this.end.y - this.hip.y, this.end.x - this.hip.x) - this.hip.absAngle;
      var dist = ((this.end.x - this.hip.x) ** 2 + (this.end.y - this.hip.y) ** 2) ** 0.5;
      var forwardness2 = dist * Math.cos(theta);
      var dF = this.forwardness - forwardness2;
      this.forwardness = forwardness2;
      if (dF * dF < 1) {
        this.step = 0;
        this.goalX = this.hip.x + (this.end.x - this.hip.x);
        this.goalY = this.hip.y + (this.end.y - this.hip.y);
      }
    }
  }
}

// ============================================================
// CREATURE CLASS
// ============================================================
class Creature {
  constructor(x, y, angle, fAccel, fFric, fRes, fThresh, rAccel, rFric, rRes, rThresh) {
    this.x = x;
    this.y = y;
    this.absAngle = angle;
    this.fSpeed = 0;
    this.fAccel = fAccel;
    this.fFric = fFric;
    this.fRes = fRes;
    this.fThresh = fThresh;
    this.rSpeed = 0;
    this.rAccel = rAccel;
    this.rFric = rFric;
    this.rRes = rRes;
    this.rThresh = rThresh;
    this.children = [];
    this.systems = [];
  }
  follow(x, y) {
    var dist = ((this.x - x) ** 2 + (this.y - y) ** 2) ** 0.5;
    var angle = Math.atan2(y - this.y, x - this.x);
    var accel = this.fAccel;
    if (this.systems.length > 0) {
      var sum = 0;
      for (var i = 0; i < this.systems.length; i++) {
        sum += this.systems[i].step == 0;
      }
      accel *= sum / this.systems.length;
    }
    this.fSpeed += accel * (dist > this.fThresh);
    this.fSpeed *= 1 - this.fRes;
    this.speed = Math.max(0, this.fSpeed - this.fFric);
    var dif = this.absAngle - angle;
    dif -= 2 * Math.PI * Math.floor(dif / (2 * Math.PI) + 1 / 2);
    if (Math.abs(dif) > this.rThresh && dist > this.fThresh) {
      this.rSpeed -= this.rAccel * (2 * (dif > 0) - 1);
    }
    this.rSpeed *= 1 - this.rRes;
    if (Math.abs(this.rSpeed) > this.rFric) {
      this.rSpeed -= this.rFric * (2 * (this.rSpeed > 0) - 1);
    } else {
      this.rSpeed = 0;
    }
    this.absAngle += this.rSpeed;
    this.absAngle -= 2 * Math.PI * Math.floor(this.absAngle / (2 * Math.PI) + 1 / 2);
    this.x += this.speed * Math.cos(this.absAngle);
    this.y += this.speed * Math.sin(this.absAngle);
    this.absAngle += Math.PI;
    for (var i = 0; i < this.children.length; i++) {
      this.children[i].follow(true, true);
    }
    for (var i = 0; i < this.systems.length; i++) {
      this.systems[i].update(x, y);
    }
    this.absAngle -= Math.PI;
    this.draw(true);
  }
  draw(iter) {
    var r = 4;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, Math.PI / 4 + this.absAngle, 7 * Math.PI / 4 + this.absAngle);
    ctx.moveTo(this.x + r * Math.cos(7 * Math.PI / 4 + this.absAngle), this.y + r * Math.sin(7 * Math.PI / 4 + this.absAngle));
    ctx.lineTo(this.x + r * Math.cos(this.absAngle) * 2 ** 0.5, this.y + r * Math.sin(this.absAngle) * 2 ** 0.5);
    ctx.lineTo(this.x + r * Math.cos(Math.PI / 4 + this.absAngle), this.y + r * Math.sin(Math.PI / 4 + this.absAngle));
    ctx.stroke();
    if (iter) {
      for (var i = 0; i < this.children.length; i++) {
        this.children[i].draw(true);
      }
    }
  }
}

// ============================================================
// SETUP LIZARD (10 LEGS FIXED)
// ============================================================
var critter;
function setupLizard(size, legs, tail) {
  var s = size;
  var startX = window.innerWidth / 2;
  var startY = Math.min(window.innerHeight / 2, window.innerHeight * 0.4);
  
  critter = new Creature(startX, startY, 0, s * 10, s * 2, 0.5, 16, 0.5, 0.085, 0.5, 0.3);
  var spinal = critter;
  
  // Neck
  for (var i = 0; i < 6; i++) {
    spinal = new Segment(spinal, s * 4, 0, 3.1415 * 2 / 3, 1.1);
    for (var ii = -1; ii <= 1; ii += 2) {
      var node = new Segment(spinal, s * 3, ii, 0.1, 2);
      for (var iii = 0; iii < 3; iii++) {
        node = new Segment(node, s * 0.1, -ii * 0.1, 0.1, 2);
      }
    }
  }
  
  // Torso and legs
  for (var i = 0; i < legs; i++) {
    if (i > 0) {
      for (var ii = 0; ii < 6; ii++) {
        spinal = new Segment(spinal, s * 4, 0, 1.571, 1.5);
        for (var iii = -1; iii <= 1; iii += 2) {
          var node = new Segment(spinal, s * 3, iii * 1.571, 0.1, 1.5);
          for (var iv = 0; iv < 3; iv++) {
            node = new Segment(node, s * 3, -iii * 0.3, 0.1, 2);
          }
        }
      }
    }
    for (var ii = -1; ii <= 1; ii += 2) {
      var node = new Segment(spinal, s * 12, ii * 0.785, 0, 8);
      node = new Segment(node, s * 16, -ii * 0.785, 6.28, 1);
      node = new Segment(node, s * 16, ii * 1.571, 3.1415, 2);
      for (var iii = 0; iii < 4; iii++) {
        new Segment(node, s * 4, (iii / 3 - 0.5) * 1.571, 0.1, 4);
      }
      new LegSystem(node, 3, s * 12, critter, 4);
    }
  }
  
  // Tail
  for (var i = 0; i < tail; i++) {
    spinal = new Segment(spinal, s * 4, 0, 3.1415 * 2 / 3, 1.1);
    for (var ii = -1; ii <= 1; ii += 2) {
      var node = new Segment(spinal, s * 3, ii, 0.1, 2);
      for (var iii = 0; iii < 3; iii++) {
        node = new Segment(node, s * 3 * (tail - i) / tail, -ii * 0.1, 0.1, 2);
      }
    }
  }
  
  AutoPath.init();
}

// ============================================================
// ANIMATION FUNCTION (requestAnimationFrame)
// ============================================================
var animationRunning = false;

function animate() {
  if (!critter || !animationRunning) return;
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var target = AutoPath.getTarget();
  critter.follow(target.x, target.y);
  
  requestAnimationFrame(animate);
}

function startAnimation() {
  if (!animationRunning) {
    animationRunning = true;
    animate();
  }
}

function stopAnimation() {
  animationRunning = false;
}

// ============================================================
// MOBILE FIX: VISIBILITY CHANGE LISTENER
// ============================================================
document.addEventListener('visibilitychange', function() {
    if (!document.hidden && critter) {
        // Page visible again - redraw and restart
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var target = AutoPath.getTarget();
        critter.follow(target.x, target.y);
        startAnimation();
    } else {
        stopAnimation();
    }
});

// ============================================================
// MOBILE FIX: PAGE FOCUS/BLUR LISTENERS
// ============================================================
window.addEventListener('focus', function() {
    if (critter) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var target = AutoPath.getTarget();
        critter.follow(target.x, target.y);
        startAnimation();
    }
});

window.addEventListener('blur', function() {
    stopAnimation();
});

// ============================================================
// MOBILE FIX: TOUCH/SCROLL REDRAW
// ============================================================
var lastTouchDraw = Date.now();
document.addEventListener('touchstart', function(e) {
    if (critter && Date.now() - lastTouchDraw > 100) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var target = AutoPath.getTarget();
        critter.follow(target.x, target.y);
        lastTouchDraw = Date.now();
        if (!animationRunning) {
            startAnimation();
        }
    }
}, { passive: true });

// ============================================================
// MOBILE FIX: SCROLL REDRAW
// ============================================================
var lastScrollDraw = Date.now();
window.addEventListener('scroll', function() {
    if (critter && Date.now() - lastScrollDraw > 100) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var target = AutoPath.getTarget();
        critter.follow(target.x, target.y);
        lastScrollDraw = Date.now();
        if (!animationRunning) {
            startAnimation();
        }
    }
}, { passive: true });

// ============================================================
// INITIALIZE - FIXED 10 LEGS
// ============================================================
var legNum = 10;
var tailNum = 80;

setupLizard(2.5 * sizeMultiplier, legNum, tailNum);

// IMMEDIATE FIRST DRAW
if (critter) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var target = AutoPath.getTarget();
    critter.follow(target.x, target.y);
}

// START ANIMATION
startAnimation();
</script>
</body>
</html>
